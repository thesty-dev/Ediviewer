<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDIFACT Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232635;
      --border: #2e3347;
      --accent: #5b8dee;
      --accent2: #7c6af7;
      --green: #2dd4a0;
      --yellow: #f0c040;
      --red: #f05a5a;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header .logo {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header .subtitle {
      color: var(--text3);
      font-size: 13px;
    }

    main {
      flex: 1;
      padding: 32px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    .upload-area {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 24px;
      position: relative;
    }

    .upload-area.drag-over {
      border-color: var(--accent);
      background: rgba(91, 141, 238, 0.07);
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .upload-area h2 {
      font-size: 18px;
      margin-bottom: 6px;
    }

    .upload-area p {
      color: var(--text2);
      font-size: 14px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--text3);
      font-size: 13px;
      margin-bottom: 24px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      padding: 16px;
      resize: vertical;
      min-height: 140px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text3); }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }

    button:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Results */
    #results { display: none; }

    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text2);
    }

    .stat-chip strong { color: var(--text); }

    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-row input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 8px 14px;
      outline: none;
      flex: 1;
      min-width: 200px;
      transition: border-color .2s;
    }

    .filter-row input:focus { border-color: var(--accent); }

    .toggle-all {
      font-size: 12px;
      padding: 7px 14px;
    }

    .segments-list { display: flex; flex-direction: column; gap: 8px; }

    .segment-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .15s;
    }

    .segment-card:hover { border-color: var(--accent); }

    .segment-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
    }

    .seg-index {
      color: var(--text3);
      font-size: 11px;
      min-width: 28px;
      font-family: monospace;
    }

    .seg-tag {
      font-family: monospace;
      font-size: 15px;
      font-weight: 700;
      min-width: 46px;
      padding: 2px 8px;
      border-radius: 5px;
      text-align: center;
    }

    .seg-tag.tag-UNA, .seg-tag.tag-UNB, .seg-tag.tag-UNZ,
    .seg-tag.tag-UNG, .seg-tag.tag-UNE, .seg-tag.tag-UNH, .seg-tag.tag-UNT {
      background: rgba(240,192,64,0.15);
      color: var(--yellow);
    }

    .seg-tag.tag-BGM { background: rgba(45,212,160,0.15); color: var(--green); }

    .seg-tag.tag-DTM { background: rgba(91,141,238,0.15); color: var(--accent); }

    .seg-tag.tag-NAD { background: rgba(124,106,247,0.15); color: var(--accent2); }

    .seg-tag.unknown { background: var(--surface2); color: var(--text3); }

    .seg-name {
      color: var(--text2);
      font-size: 13px;
      flex: 1;
    }

    .seg-qualifier {
      font-size: 12px;
      color: var(--text3);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .seg-arrow {
      color: var(--text3);
      font-size: 12px;
      transition: transform .2s;
    }

    .segment-card.open .seg-arrow { transform: rotate(90deg); }

    .segment-body {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }

    .segment-card.open .segment-body { display: block; }

    .raw-line {
      font-family: monospace;
      font-size: 12px;
      color: var(--text3);
      background: var(--bg);
      border-radius: 6px;
      padding: 8px 12px;
      margin: 12px 0;
      word-break: break-all;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      color: var(--text3);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }

    tbody tr:hover { background: rgba(255,255,255,0.02); }

    td {
      padding: 7px 10px;
      border-bottom: 1px solid rgba(46,51,71,0.6);
      vertical-align: top;
    }

    td:last-child { border-bottom: none; }

    .elem-pos {
      color: var(--text3);
      font-family: monospace;
      font-size: 11px;
    }

    .comp-list { display: flex; flex-wrap: wrap; gap: 6px; }

    .comp-value {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: monospace;
      font-size: 12px;
      color: var(--green);
    }

    .comp-value.empty {
      color: var(--text3);
      font-style: italic;
    }

    .comp-idx {
      font-size: 10px;
      color: var(--text3);
      margin-right: 2px;
    }

    .error-box {
      background: rgba(240,90,90,0.12);
      border: 1px solid rgba(240,90,90,0.3);
      border-radius: var(--radius);
      padding: 16px 20px;
      color: var(--red);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text3);
    }

    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">EDIFACT Viewer</div>
    <div class="subtitle">EDIFACT Dateien analysieren &amp; Felder auslesen</div>
  </div>
</header>

<main>

  <!-- Upload -->
  <div class="upload-area" id="dropZone">
    <input type="file" id="fileInput" accept=".edi,.txt,.edifact,.dat">
    <div class="upload-icon">📂</div>
    <h2>EDIFACT-Datei hier ablegen</h2>
    <p>oder klicken zum Auswählen &nbsp;·&nbsp; EDI, TXT, EDIFACT</p>
  </div>

  <div class="divider">oder Text direkt eingeben</div>

  <textarea id="textInput" placeholder="UNA:+.? '&#10;UNB+UNOC:3+SENDER:14+RECEIVER:14+200101:1200+1'&#10;UNH+1+ORDERS:D:96A:UN'&#10;BGM+220+PO12345+9'&#10;..."></textarea>

  <div class="btn-row">
    <button class="btn-primary" id="parseBtn" onclick="doParse()">Analysieren</button>
    <button class="btn-secondary" onclick="loadExample()">Beispiel laden</button>
    <button class="btn-secondary" onclick="clearAll()">Leeren</button>
  </div>

  <!-- Error -->
  <div class="error-box hidden" id="errorBox"></div>

  <!-- Loading -->
  <div class="loading hidden" id="loadingBox">
    <div class="spinner"></div>
    <div>Analysiere…</div>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="stats-bar" id="statsBar"></div>
    <div class="filter-row">
      <input type="text" id="filterInput" placeholder="Segmente filtern (Tag, Name, Wert…)" oninput="filterSegments()">
      <button class="btn-secondary toggle-all" onclick="toggleAll(true)">Alle öffnen</button>
      <button class="btn-secondary toggle-all" onclick="toggleAll(false)">Alle schließen</button>
    </div>
    <div class="segments-list" id="segmentsList"></div>
  </div>

</main>

<script>
const EXAMPLE = `UNA:+.? '
UNB+UNOC:3+4012345000000:14+4012345000001:14+200101:1200+1'
UNH+1+INVOIC:D:96A:UN'
BGM+380+INV-2024-001+9'
DTM+137:20240115:102'
DTM+35:20240120:102'
NAD+BY+4000001000000::9++MUSTERMANN GMBH+MUSTERSTRASSE 1+MUSTERSTADT++12345+DE'
NAD+SE+4000002000000::9++LIEFERANT AG+LIEFERWEG 5+LIEFERSTADT++54321+DE'
CUX+2:EUR:4'
LIN+1++4012345001234:EN'
IMD+F++:::Produkt Alpha'
QTY+47:10:PCE'
MOA+203:250.00'
PRI+INV:25.00:NTP:1:PCE'
TAX+7+VAT+++:::19+S'
MOA+124:47.50'
LIN+2++4012345005678:EN'
IMD+F++:::Produkt Beta'
QTY+47:5:PCE'
MOA+203:150.00'
PRI+INV:30.00:NTP:1:PCE'
TAX+7+VAT+++:::19+S'
MOA+124:28.50'
MOA+77:400.00'
MOA+86:76.00'
MOA+79:476.00'
CNT+2:2'
UNT+26+1'
UNZ+1+1'`;

let parsedData = null;

async function doParse() {
  const text = document.getElementById('textInput').value.trim();
  const file = document.getElementById('fileInput').files[0];

  if (!text && !file) {
    showError('Bitte eine Datei auswählen oder Text eingeben.');
    return;
  }

  showLoading(true);
  hideError();

  try {
    const fd = new FormData();
    if (file) {
      fd.append('file', file);
    } else {
      fd.append('text', text);
    }

    const res = await fetch('/parse', { method: 'POST', body: fd });
    const data = await res.json();

    if (data.error) {
      showError(data.error);
    } else {
      parsedData = data;
      renderResults(data);
    }
  } catch (e) {
    showError('Netzwerkfehler: ' + e.message);
  } finally {
    showLoading(false);
  }
}

function renderResults(data) {
  const results = document.getElementById('results');
  results.style.display = 'block';

  // Stats
  const seps = data.separators;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip">Segmente: <strong>${data.segment_count}</strong></div>
    <div class="stat-chip">Trennzeichen Segment: <strong><code>${seps.segment}</code></strong></div>
    <div class="stat-chip">Trennzeichen Datenelement: <strong><code>${seps.data}</code></strong></div>
    <div class="stat-chip">Trennzeichen Komponente: <strong><code>${seps.component}</code></strong></div>
  `;

  renderSegments(data.segments);
}

function renderSegments(segments) {
  const list = document.getElementById('segmentsList');
  list.innerHTML = '';

  segments.forEach((seg, i) => {
    const card = document.createElement('div');
    card.className = 'segment-card';
    card.dataset.tag = seg.tag;
    card.dataset.raw = seg.raw.toLowerCase();
    card.dataset.name = seg.name.toLowerCase();

    const tagClass = ['UNA','UNB','UNZ','UNG','UNE','UNH','UNT'].includes(seg.tag)
      ? `tag-${seg.tag}` : seg.name !== 'Unknown Segment' ? `tag-${seg.tag}` : 'unknown';

    const qualDesc = seg.qualifier_desc
      ? ` — <em>${esc(seg.qualifier_desc)}</em>` : '';

    card.innerHTML = `
      <div class="segment-header" onclick="toggleCard(this.parentElement)">
        <span class="seg-index">#${i+1}</span>
        <span class="seg-tag ${tagClass}">${esc(seg.tag)}</span>
        <span class="seg-name">${esc(seg.name)}</span>
        <span class="seg-qualifier">${qualDesc}</span>
        <span class="seg-arrow">▶</span>
      </div>
      <div class="segment-body">
        <div class="raw-line">RAW: ${esc(seg.raw)}</div>
        ${buildTable(seg.elements)}
      </div>
    `;
    list.appendChild(card);
  });
}

function buildTable(elements) {
  if (!elements || elements.length === 0) return '<p style="color:var(--text3);font-size:13px;padding-top:4px">Keine Datenelemente</p>';

  let rows = '';
  elements.forEach((comps, ei) => {
    const nonEmpty = comps.filter(c => c.trim());
    if (nonEmpty.length === 0) return;

    const chips = comps.map((c, ci) => {
      if (!c.trim()) return '';
      return `<span class="comp-value"><span class="comp-idx">${ci+1}:</span>${esc(c)}</span>`;
    }).join('');

    rows += `
      <tr>
        <td class="elem-pos">DE${String(ei+1).padStart(2,'0')}</td>
        <td><div class="comp-list">${chips}</div></td>
      </tr>
    `;
  });

  if (!rows) return '';

  return `
    <table>
      <thead><tr><th>Pos.</th><th>Werte</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function filterSegments() {
  const q = document.getElementById('filterInput').value.toLowerCase();
  document.querySelectorAll('.segment-card').forEach(card => {
    const match = !q
      || card.dataset.tag.includes(q)
      || card.dataset.name.includes(q)
      || card.dataset.raw.includes(q);
    card.style.display = match ? '' : 'none';
  });
}

function toggleCard(card) {
  card.classList.toggle('open');
}

function toggleAll(open) {
  document.querySelectorAll('.segment-card').forEach(c => {
    if (c.style.display !== 'none') {
      c.classList.toggle('open', open);
    }
  });
}

function loadExample() {
  document.getElementById('textInput').value = EXAMPLE;
  document.getElementById('fileInput').value = '';
}

function clearAll() {
  document.getElementById('textInput').value = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('results').style.display = 'none';
  hideError();
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.remove('hidden');
}

function hideError() {
  document.getElementById('errorBox').classList.add('hidden');
}

function showLoading(on) {
  document.getElementById('loadingBox').classList.toggle('hidden', !on);
  document.getElementById('parseBtn').disabled = on;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Drag & drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) {
    document.getElementById('fileInput').files; // reference
    const dt = new DataTransfer();
    dt.items.add(file);
    document.getElementById('fileInput').files = dt.files;
    doParse();
  }
});

// File input change
document.getElementById('fileInput').addEventListener('change', () => {
  if (document.getElementById('fileInput').files[0]) doParse();
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') doParse();
});
</script>

</body>
</html>
